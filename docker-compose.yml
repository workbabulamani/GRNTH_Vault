services:
  grnthvault:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - /app/node_modules
    env_file:
      - .env
    environment:
      - PORT=3000
      - DB_PATH=/app/data/md_viewer.db
      - UPLOAD_DIR=/app/uploads/images
    restart: unless-stopped
