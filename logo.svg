<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="doorGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2c2c3e"/>
      <stop offset="100%" stop-color="#111118"/>
    </radialGradient>
    <radialGradient id="goldRim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d98b"/>
      <stop offset="50%" stop-color="#c9941a"/>
      <stop offset="100%" stop-color="#7a5500"/>
    </radialGradient>
    <linearGradient id="goldSpoke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d98b"/>
      <stop offset="50%" stop-color="#c9941a"/>
      <stop offset="100%" stop-color="#8a6010"/>
    </linearGradient>
    <linearGradient id="hingeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a820"/>
      <stop offset="100%" stop-color="#7a5500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="32" fill="url(#bgGrad)"/>

  <!-- Subtle background ring glow -->
  <circle cx="200" cy="200" r="155" fill="none" stroke="#c9941a" stroke-width="0.5" opacity="0.15"/>
  <circle cx="200" cy="200" r="168" fill="none" stroke="#c9941a" stroke-width="0.5" opacity="0.08"/>

  <!-- Hinge bar on right -->
  <rect x="336" y="80" width="28" height="240" rx="6" fill="url(#hingeGrad)" opacity="0.9"/>
  <rect x="340" y="95" width="20" height="36" rx="4" fill="#0a0a0f" opacity="0.7"/>
  <rect x="340" y="182" width="20" height="36" rx="4" fill="#0a0a0f" opacity="0.7"/>
  <rect x="340" y="269" width="20" height="36" rx="4" fill="#0a0a0f" opacity="0.7"/>
  <rect x="336" y="80" width="5" height="240" rx="3" fill="#f5d98b" opacity="0.3"/>

  <!-- Main vault door face -->
  <circle cx="200" cy="200" r="148" fill="url(#doorGrad)"/>

  <!-- Outer gold rim -->
  <circle cx="200" cy="200" r="148" fill="none" stroke="url(#goldRim)" stroke-width="5" filter="url(#softglow)"/>

  <!-- Rivet ring -->
  <circle cx="200" cy="200" r="138" fill="none" stroke="#c9941a" stroke-width="1" opacity="0.5"/>

  <!-- 12 rivets -->
  <circle cx="200" cy="54" r="5" fill="#c9941a" filter="url(#softglow)"/>
  <circle cx="269" cy="74" r="5" fill="#c9941a" filter="url(#softglow)"/>
  <circle cx="326" cy="131" r="5" fill="#c9941a" filter="url(#softglow)"/>
  <circle cx="346" cy="200" r="5" fill="#c9941a" filter="url(#softglow)"/>
  <circle cx="326" cy="269" r="5" fill="#c9941a" filter="url(#softglow)"/>
  <circle cx="269" cy="326" r="5" fill="#c9941a" filter="url(#softglow)"/>
  <circle cx="200" cy="346" r="5" fill="#c9941a" filter="url(#softglow)"/>
  <circle cx="131" cy="326" r="5" fill="#c9941a" filter="url(#softglow)"/>
  <circle cx="74" cy="269" r="5" fill="#c9941a" filter="url(#softglow)"/>
  <circle cx="54" cy="200" r="5" fill="#c9941a" filter="url(#softglow)"/>
  <circle cx="74" cy="131" r="5" fill="#c9941a" filter="url(#softglow)"/>
  <circle cx="131" cy="74" r="5" fill="#c9941a" filter="url(#softglow)"/>

  <!-- Locking bolt ring -->
  <circle cx="200" cy="200" r="122" fill="none" stroke="#c9941a" stroke-width="1.5" opacity="0.6"/>

  <!-- 6 locking bolts -->
  <rect x="188" y="73" width="24" height="42" rx="12" fill="#c9941a" opacity="0.9" filter="url(#softglow)"/>
  <rect x="192" y="77" width="16" height="34" rx="8" fill="none" stroke="#f5d98b" stroke-width="1" opacity="0.6"/>
  <rect x="188" y="73" width="24" height="42" rx="12" fill="#c9941a" opacity="0.9" transform="rotate(60 200 200)" filter="url(#softglow)"/>
  <rect x="192" y="77" width="16" height="34" rx="8" fill="none" stroke="#f5d98b" stroke-width="1" opacity="0.6" transform="rotate(60 200 200)"/>
  <rect x="188" y="73" width="24" height="42" rx="12" fill="#c9941a" opacity="0.9" transform="rotate(120 200 200)" filter="url(#softglow)"/>
  <rect x="192" y="77" width="16" height="34" rx="8" fill="none" stroke="#f5d98b" stroke-width="1" opacity="0.6" transform="rotate(120 200 200)"/>
  <rect x="188" y="73" width="24" height="42" rx="12" fill="#c9941a" opacity="0.9" transform="rotate(180 200 200)" filter="url(#softglow)"/>
  <rect x="192" y="77" width="16" height="34" rx="8" fill="none" stroke="#f5d98b" stroke-width="1" opacity="0.6" transform="rotate(180 200 200)"/>
  <rect x="188" y="73" width="24" height="42" rx="12" fill="#c9941a" opacity="0.9" transform="rotate(240 200 200)" filter="url(#softglow)"/>
  <rect x="192" y="77" width="16" height="34" rx="8" fill="none" stroke="#f5d98b" stroke-width="1" opacity="0.6" transform="rotate(240 200 200)"/>
  <rect x="188" y="73" width="24" height="42" rx="12" fill="#c9941a" opacity="0.9" transform="rotate(300 200 200)" filter="url(#softglow)"/>
  <rect x="192" y="77" width="16" height="34" rx="8" fill="none" stroke="#f5d98b" stroke-width="1" opacity="0.6" transform="rotate(300 200 200)"/>

  <!-- Inner door panel rings -->
  <circle cx="200" cy="200" r="95" fill="none" stroke="#c9941a" stroke-width="2" opacity="0.7"/>
  <circle cx="200" cy="200" r="88" fill="none" stroke="#c9941a" stroke-width="1" opacity="0.3"/>

  <!-- 8 wheel spokes -->
  <line x1="200" y1="112" x2="200" y2="200" stroke="url(#goldSpoke)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="200" y1="288" x2="200" y2="200" stroke="url(#goldSpoke)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="112" y1="200" x2="200" y2="200" stroke="url(#goldSpoke)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="288" y1="200" x2="200" y2="200" stroke="url(#goldSpoke)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="138" y1="138" x2="200" y2="200" stroke="url(#goldSpoke)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="262" y1="138" x2="200" y2="200" stroke="url(#goldSpoke)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="138" y1="262" x2="200" y2="200" stroke="url(#goldSpoke)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="262" y1="262" x2="200" y2="200" stroke="url(#goldSpoke)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Wheel rim -->
  <circle cx="200" cy="200" r="76" fill="none" stroke="url(#goldRim)" stroke-width="4" filter="url(#softglow)"/>

  <!-- Grip handles on wheel -->
  <circle cx="200" cy="126" r="8" fill="#1a1a2e" stroke="#c9941a" stroke-width="2.5"/>
  <circle cx="254" cy="146" r="8" fill="#1a1a2e" stroke="#c9941a" stroke-width="2.5"/>
  <circle cx="274" cy="200" r="8" fill="#1a1a2e" stroke="#c9941a" stroke-width="2.5"/>
  <circle cx="254" cy="254" r="8" fill="#1a1a2e" stroke="#c9941a" stroke-width="2.5"/>
  <circle cx="200" cy="274" r="8" fill="#1a1a2e" stroke="#c9941a" stroke-width="2.5"/>
  <circle cx="146" cy="254" r="8" fill="#1a1a2e" stroke="#c9941a" stroke-width="2.5"/>
  <circle cx="126" cy="200" r="8" fill="#1a1a2e" stroke="#c9941a" stroke-width="2.5"/>
  <circle cx="146" cy="146" r="8" fill="#1a1a2e" stroke="#c9941a" stroke-width="2.5"/>

  <!-- Center hub -->
  <circle cx="200" cy="200" r="32" fill="#111118" stroke="url(#goldRim)" stroke-width="3" filter="url(#softglow)"/>
  <circle cx="200" cy="200" r="22" fill="none" stroke="#c9941a" stroke-width="1.5" opacity="0.7"/>

  <!-- Center keyhole -->
  <circle cx="200" cy="195" r="8" fill="#c9941a" opacity="0.9" filter="url(#glow)"/>
  <path d="M196 200 L196 212 L204 212 L204 200 Z" fill="#c9941a" opacity="0.9" filter="url(#glow)"/>

  <!-- Shine highlight -->
  <ellipse cx="168" cy="158" rx="30" ry="18" fill="white" opacity="0.03" transform="rotate(-30 168 158)"/>
</svg>